services:
  mongodb:
    image: mongo:7
    container_name: rehab-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rehab-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  web:
    build:
      context: ../web-client
      dockerfile: Dockerfile
    container_name: rehab-web
    restart: unless-stopped
    env_file:
      - ../web-client/.env
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mongo_data:
